<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embed Chart — AI Coding Tool Adoption</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #080c18; --card: #151b30; --border: #1e2440;
            --text: #eae8e3; --text-sec: #9b9da6; --text-dim: #5a5d6a;
        }
        body { font-family: 'Albert Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .embed-wrap {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 24px; max-width: 600px; margin: 0 auto;
        }
        .embed-title { font-weight: 600; font-size: 1rem; margin-bottom: 4px; }
        .embed-subtitle { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 16px; }
        .embed-canvas { position: relative; height: 280px; }
        .embed-footer {
            margin-top: 12px; font-size: 0.65rem; color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace; display: flex;
            justify-content: space-between; align-items: center;
        }
        .embed-footer a { color: var(--text-sec); text-decoration: none; }
        .embed-footer a:hover { color: var(--text); }
    </style>
</head>
<body>
    <div class="embed-wrap">
        <div class="embed-title" id="title">Loading...</div>
        <div class="embed-subtitle" id="subtitle"></div>
        <div class="embed-canvas"><canvas id="chart"></canvas></div>
        <div class="embed-footer">
            <span id="source"></span>
            <a href="index.html" target="_blank">AI / CODE</a>
        </div>
    </div>

    <script src="js/charts.js"></script>
    <script>
    /* ======== Embeddable Chart Configurations ======== */
    const CHARTS = {
        adoption: {
            title: 'AI Tool Adoption Over Time',
            subtitle: 'Stack Overflow Developer Survey, 2023–2025',
            source: 'stackoverflow.co',
            type: 'bar',
            data: {
                labels: ['2023', '2024', '2025'],
                datasets: [
                    { label: 'Currently Using', data: [43.78, 61.8, 78.5], backgroundColor: C.amberA, borderColor: C.amber, borderWidth: 1, borderRadius: 6 },
                    { label: 'Plan to Use', data: [25.46, 13.8, 5.3], backgroundColor: C.violetA, borderColor: C.violet, borderWidth: 1, borderRadius: 6 },
                    { label: 'No Plans', data: [30.76, 24.4, 16.2], backgroundColor: 'rgba(90,93,106,0.5)', borderColor: C.dim, borderWidth: 1, borderRadius: 6 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } },
                scales: {
                    x: { stacked: true, grid: { display: false } },
                    y: { stacked: true, max: 100, grid: { color: C.grid }, ticks: { callback: v => v + '%' } }
                }
            }
        },
        trust: {
            title: 'Developer Trust in AI Output',
            subtitle: 'Stack Overflow 2025 — trust in AI accuracy',
            source: 'stackoverflow.co/2025',
            type: 'bar',
            data: {
                labels: ['Distrust AI Accuracy', 'Neutral', 'Trust AI Accuracy'],
                datasets: [{
                    data: [46, 21, 33],
                    backgroundColor: [C.redA, 'rgba(90,93,106,0.4)', C.greenA],
                    borderColor: [C.red, C.dim, C.green],
                    borderWidth: 1, borderRadius: 6
                }]
            },
            options: {
                indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { max: 55, grid: { color: C.grid }, ticks: { callback: v => v + '%' } },
                    y: { grid: { display: false } }
                }
            }
        },
        tools: {
            title: 'Tool Usage — Agent Users',
            subtitle: 'Stack Overflow 2025 (n≈8,323)',
            source: 'stackoverflow.co/2025',
            type: 'bar',
            data: {
                labels: ['ChatGPT', 'GitHub Copilot', 'Gemini', 'Claude Code'],
                datasets: [{
                    data: [81.7, 67.9, 47.4, 40.8],
                    backgroundColor: [C.amberA, C.cyanA, C.greenA, C.violetA],
                    borderColor: [C.amber, C.cyan, C.green, C.violet],
                    borderWidth: 1, borderRadius: 6
                }]
            },
            options: {
                indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { max: 100, grid: { color: C.grid }, ticks: { callback: v => v + '%' } },
                    y: { grid: { display: false } }
                }
            }
        },
        frequency: {
            title: 'AI Tool Usage Frequency (2025)',
            subtitle: 'Stack Overflow 2025 — how often developers use AI',
            source: 'stackoverflow.co/2025',
            type: 'doughnut',
            data: {
                labels: ['Daily (47.1%)', 'Weekly (17.7%)', 'Monthly (13.7%)', 'Plan Soon (5.3%)', 'No Plans (16.2%)'],
                datasets: [{
                    data: [47.1, 17.7, 13.7, 5.3, 16.2],
                    backgroundColor: [C.amber, C.violet, C.cyan, C.greenBg, 'rgba(90,93,106,0.35)'],
                    borderWidth: 0, spacing: 2, borderRadius: 4
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false, cutout: '60%',
                plugins: { legend: { position: 'right', labels: { font: { size: 11 }, padding: 10 } } }
            }
        },
        agentic: {
            title: 'Agent vs Assistive Adoption',
            subtitle: 'Stack Overflow 2025 — agent use frequency',
            source: 'stackoverflow.co/2025',
            type: 'bar',
            data: {
                labels: ['Daily Agent', 'Weekly', 'Monthly', 'Copilot-Only', 'No Agent Plans'],
                datasets: [{
                    data: [14.1, 9.0, 7.8, 13.8, 37.9],
                    backgroundColor: [C.violetA, C.violetA, C.violetA, C.amberA, 'rgba(90,93,106,0.45)'],
                    borderColor: [C.violet, C.violet, C.violet, C.amber, C.dim],
                    borderWidth: 1, borderRadius: 6
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false } },
                    y: { grid: { color: C.grid }, ticks: { callback: v => v + '%' } }
                }
            }
        }
    };

    /* ======== Render from URL param ======== */
    const params = new URLSearchParams(window.location.search);
    const chartId = params.get('chart') || 'adoption';
    const config = CHARTS[chartId];

    if (config) {
        document.getElementById('title').textContent = config.title;
        document.getElementById('subtitle').textContent = config.subtitle;
        document.getElementById('source').textContent = config.source;
        new Chart(document.getElementById('chart'), {
            type: config.type,
            data: config.data,
            options: { ...config.options, animation: { duration: 800, easing: 'easeOutQuart' } }
        });
    } else {
        document.getElementById('title').textContent = 'Chart not found';
        document.getElementById('subtitle').textContent = 'Available: ' + Object.keys(CHARTS).join(', ');
    }
    </script>
</body>
</html>
